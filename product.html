<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product details | NovaCart</title>
    <link rel="stylesheet" href="css/stylesheet.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-content">
            <a href="index.html" class="brand"><span>N</span>NovaCart</a>
            <nav aria-label="Main navigation">
                <ul id="links"><li><a href="login.html">Sign In</a></li><li><a class="button button-small" href="register.html">Create Account</a></li></ul>
                <ul id="user_info" hidden><li><span class="user-greeting">Hello, <b id="user"></b></span></li><li><a href="wishlist.html">Wishlist</a></li><li><a href="#" id="logout">Log Out</a></li></ul>
                <div class="shopping_cart"><a class="cart-button" href="cartsproducts.html" aria-label="View cart"><svg aria-hidden="true" viewBox="0 0 24 24"><path d="M3 3h2l2.1 10.1a2 2 0 0 0 2 1.6h7.8a2 2 0 0 0 2-1.6L20 7H6M9 20a1 1 0 1 0 0-2 1 1 0 0 0 0 2Zm8 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z"/></svg><span class="badge">0</span></a></div>
            </nav>
        </div>
    </header>
    <main class="container page-main">
        <nav id="product_breadcrumb" class="breadcrumb" aria-label="Breadcrumb"></nav>
        <section id="product_detail"></section>
        <section id="product_information" class="product-information"></section>
        <section id="bought_together" class="recommendation-section"></section>
        <section class="reviews-section"><div class="section-heading"><div><span class="eyebrow">Verified Feedback</span><h2>Customer Reviews</h2></div></div><div id="product_reviews"></div></section>
        <section class="related-section"><div class="section-heading"><div><span class="eyebrow">Same Category</span><h2>Related Products</h2></div></div><div id="related_products" class="products"></div></section>
        <section class="related-section"><div class="section-heading"><div><span class="eyebrow">Selected for You</span><h2>You May Also Like</h2></div></div><div id="recommended_products" class="products"></div></section>
    </main>
    <script src="js/store.js"></script>
    <script src="js/product.js"></script>
</body>
</html>
