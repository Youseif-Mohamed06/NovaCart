<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in | NovaCart</title>
    <link rel="stylesheet" href="css/stylesheet.css">
</head>
<body class="auth-page">
    <a href="index.html" class="brand auth-brand"><span>N</span>NovaCart</a>
    <main class="auth-layout">
        <section class="auth-intro">
            <span class="eyebrow">Welcome Back</span>
            <h1>Your Favorites Are Waiting.</h1>
            <p>Sign in to continue shopping and keep your cart moving.</p>
        </section>
        <section class="section-form">
            <h2>Sign In</h2>
            <p>Enter the account details you used when registering.</p>
            <form id="login_form">
                <label>Email Address or Phone Number<input type="text" id="identifier" autocomplete="username" placeholder="name@example.com or +20 100 000 0000" required></label>
                <label>Password<input type="password" id="password" autocomplete="current-password" required></label>
                <p id="form_message" class="form-message" aria-live="polite"></p>
                <button class="button button-full" type="submit">Sign In</button>
                <p class="form-switch">New to NovaCart? <a href="register.html">Create an Account</a></p>
            </form>
        </section>
    </main>
    <script src="js/login.js"></script>
</body>
</html>
