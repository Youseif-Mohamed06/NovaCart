<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in | NovaCart</title>
    <link rel="stylesheet" href="css/stylesheet.css">
    <script>!function(){try{"dark"===localStorage.getItem("novacart-theme")&&document.documentElement.setAttribute("data-theme","dark")}catch(e){}}();</script>
</head>
<body class="auth-page">
    <button type="button" id="theme_toggle" class="theme-toggle" aria-label="Switch to dark mode" aria-pressed="false"><svg class="icon-moon" aria-hidden="true" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
    <a href="index.html" class="brand auth-brand"><span>N</span>NovaCart</a>
    <main class="auth-layout">
        <section class="auth-intro">
            <span class="eyebrow">Welcome Back</span>
            <h1>Your Favorites Are Waiting.</h1>
            <p>Sign in to continue shopping and keep your cart moving.</p>
        </section>
        <section class="section-form">
            <h2>Sign In</h2>
            <p>Enter the account details you used when registering.</p>
            <form id="login_form">
                <label>Email Address or Phone Number<input type="text" id="identifier" autocomplete="username" placeholder="name@example.com or +20 100 000 0000" required></label>
                <label>Password<input type="password" id="password" autocomplete="current-password" required></label>
                <p id="form_message" class="form-message" aria-live="polite"></p>
                <button class="button button-full" type="submit">Sign In</button>
                <p class="form-switch">New to NovaCart? <a href="register.html">Create an Account</a></p>
            </form>
        </section>
    </main>
    <script src="js/login.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>
